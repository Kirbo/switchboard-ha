name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [hacs, hassfest]
    # Only cut releases on pushes to main, after validation passes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - name: CalVer release (git-cliff notes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/release.sh
