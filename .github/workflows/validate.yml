name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # `brands` requires the domain to be in home-assistant/brands (a separate PR).
          # Not needed to install as a HACS custom repository; revisit if we seek default-store listing.
          ignore: brands

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
