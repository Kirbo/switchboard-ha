[tool.ruff]
target-version = "py312"  # oldest Python the HA minimum (2025.1) still supports
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["custom_components.switchboard"]
combine-as-imports = true
